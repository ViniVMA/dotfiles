# =============================================================================
#  kitty.conf  —  migrated from WezTerm (~/.config/wezterm)
#  Docs: https://sw.kovidgoyal.net/kitty/conf/
#  Reload after editing: Ctrl+Shift+F5 (or restart kitty)
#
#  NOTE: kitty does NOT support trailing inline comments on directive lines.
#  Every comment must be on its own line (like these).
#
#  Model: tmux owns multiplexing (windows/panes). kitty auto-attaches to a
#  shared "main" tmux session on launch, mirroring the WezTerm default_prog.
# =============================================================================


# -----------------------------------------------------------------------------
#  FONTS   (WezTerm: font_with_fallback + font_size 15)
# -----------------------------------------------------------------------------
# WezTerm fell back across Geist -> Maple -> Departure -> Commit -> Monaspace.
# kitty uses the primary family and lets macOS/CoreText fall back automatically
# for missing glyphs, so the primary is all that's usually needed.
font_family      Geist Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        15.0

# To force a specific fallback font for given Unicode ranges, use symbol_map:
# symbol_map U+E000-U+F8FF  Maple Mono


# -----------------------------------------------------------------------------
#  CURSOR   (WezTerm: default_cursor_style = BlinkingBlock + koda cursor colors)
# -----------------------------------------------------------------------------
# WezTerm's force_reverse_video_cursor has no direct kitty toggle; the explicit
# light cursor / dark text below reproduces the look on a dark background.
cursor_shape            block
# -1 = blink at the system default rate
cursor_blink_interval   -1
# koda cursor_bg
cursor                  #efefef
# koda cursor_fg
cursor_text_color       #000000


# -----------------------------------------------------------------------------
#  COLORS   (WezTerm koda scheme — colors/koda.lua)
# -----------------------------------------------------------------------------
foreground            #ffffff
background            #101010

selection_foreground  #ffffff
selection_background  #333333

# normal (ansi 0-7)
color0  #101010
color1  #ff7676
color2  #a3d6a3
color3  #ffffff
color4  #b3b3b3
color5  #f4b8e4
color6  #fafafa
color7  #a5adce
# bright (ansi 8-15)
color8  #666666
color9  #ff5733
color10 #8ec772
color11 #d9ba73
color12 #ffffff
color13 #f2a4db
color14 #5abfb5
color15 #b5bfe2

# split / pane borders (koda split = #555555)
active_border_color    #555555
inactive_border_color  #333333


# =============================================================================
#  WINDOW & APPEARANCE
# =============================================================================
# WezTerm: window_background_opacity 0.8 + macos_window_background_blur 90.
# kitty's blur is a different scale (radius) than WezTerm's 0-100, so ~64 is a
# comparably heavy frost. Tune to taste.
background_opacity          0.8
background_blur             64
dynamic_background_opacity  yes

window_padding_width        10

# WezTerm window_decorations = "RESIZE" (no title bar, still resizable).
# titlebar-only keeps the rounded corners + shadow; use `yes` for fully square.
hide_window_decorations     titlebar-only

# WezTerm used fixed initial_cols/initial_rows (don't restore last size).
remember_window_size        no
initial_window_width        114c
initial_window_height       31c

# Confirm before closing any tab/window AND before quitting (Cmd+Q).
# Positive value counts all kitty windows regardless of what's running.
confirm_os_window_close     1

# WezTerm: send_composed_key_when_*_alt_is_pressed = false -> Option acts as Alt.
macos_option_as_alt                 yes
macos_show_window_title_in          all
macos_quit_when_last_window_closed  yes


# =============================================================================
#  TABS   (WezTerm: use_fancy_tab_bar=false, hide_tab_bar_if_only_one_tab=true)
# =============================================================================
# Switch tab_bar_style to `separator` for a flatter, retro look.
tab_bar_edge                top
# fade: each tab is a solid tile whose edges fade into the bar background,
# giving the soft gradient look (no hard powerline chevrons).
tab_bar_style               fade
# How the tab edges fade out — each value is the alpha of one trailing cell
# (0 = opaque, 1 = fully faded into the background). Add entries to lengthen
# the gradient, e.g. "0.15 0.3 0.45 0.6 0.75 0.9 1" for a smoother/longer fade.
tab_fade                    0.25 0.5 0.75 1
# (tab_powerline_style only applies when tab_bar_style is `powerline`.)
# tab_bar_min_tabs 2 == hide_tab_bar_if_only_one_tab
tab_bar_min_tabs            2
# {activity_symbol} shows ◉ on a background tab with new output (e.g. an IRC
# channel that just spoke); {bell_symbol} shows on a bell. Both render empty
# when idle, so a quiet tab stays a clean "1: irc". (From the kitty discussion
# #4447 comment this style is based on.)
tab_activity_symbol         ◉
# The trailing conditional adds a space after the dot/bell only when one is
# shown, so an idle tab stays "6: title" with no stray leading space.
tab_title_template          "{bell_symbol}{activity_symbol}{' ' if activity_symbol or bell_symbol else ''}{index}: {title}"
# Active tab in italic to echo the tmux active-window style.
active_tab_font_style       italic
inactive_tab_font_style     normal

# koda tab_bar colors
# Active tab = koda green (#a3d6a3, same as the tmux active window / active pane
# border) with dark text; inactive tabs = a gray segment so the slanted chevrons
# read as distinct tiles, like the tmux bar.
tab_bar_background          #101010
active_tab_background       #a3d6a3
active_tab_foreground       #101010
inactive_tab_background     #2c2c2c
inactive_tab_foreground     #b3b3b3


# =============================================================================
#  SHELL / tmux   (kitty owns tabs; each tab = its own tmux session)
# =============================================================================
# Each tab runs this wrapper, which gives it its OWN tmux session named after
# the tab's directory (so tabs don't mirror). tmux owns panes/splits/persistence
# inside a tab. For a plain login shell instead, set: shell .
shell /Users/vini/.config/kitty/tmux-tab.sh

# Remote control so the sessionizer (and scripts) can open/focus tabs.
allow_remote_control yes
listen_on unix:/tmp/kitty


# =============================================================================
#  PERFORMANCE   (WezTerm: max_fps = 240)
# =============================================================================
# Lower repaint delay + uncap from the monitor refresh for snappier rendering.
# Costs a little more battery/GPU; raise repaint_delay or set sync_to_monitor
# back to `yes` to conserve power.
repaint_delay      4
input_delay        1
sync_to_monitor    no


# =============================================================================
#  KEYBINDINGS   (terminal-level only — tmux handles splits/panes/windows)
# =============================================================================
kitty_mod                   ctrl+shift

# --- From WezTerm keys.lua ---------------------------------------------------
# WezTerm: Alt+Enter -> toggle fullscreen
map alt+enter               toggle_fullscreen
# WezTerm: Shift+Enter -> send a literal newline
map shift+enter             send_text all \n
# WezTerm: Ctrl+Space -> send NUL (\x00)
map ctrl+space              send_text all \x00
# WezTerm's Alt+. command palette has no kitty equivalent (omitted).

# --- Font size ---------------------------------------------------------------
map kitty_mod+equal         change_font_size all +1.0
map kitty_mod+minus         change_font_size all -1.0
map kitty_mod+0             change_font_size all 0

# --- Background opacity on the fly -------------------------------------------
map kitty_mod+a>m           set_background_opacity +0.05
map kitty_mod+a>l           set_background_opacity -0.05
map kitty_mod+a>1           set_background_opacity 1
map kitty_mod+a>d           set_background_opacity default

# --- Tabs (kitty owns tabs; each tab = its own tmux session) -----------------
# New tab inherits the current dir, so the wrapper names the session after it.
map cmd+t                   new_tab_with_cwd
map kitty_mod+t             new_tab_with_cwd
# Plain tab WITHOUT tmux: runs a login shell directly, bypassing the wrapper.
map cmd+shift+t             launch --type=tab --cwd=current zsh -l
# Close the current tab without asking. (Under tmux-per-tab, kitty can't see the
# shell prompt inside tmux, so `close_window_with_confirmation ignore-shell`
# would prompt on every tab — hence plain `close_tab`. Quitting the whole
# terminal still requires the deliberate Cmd+Option+Q chord below.)
map cmd+w                   close_tab

# --- Quit safety -------------------------------------------------------------
# Cmd+Q is trivial to fat-finger and would close the whole terminal. Disable it
# and move quitting to the deliberate Cmd+Option+Q chord. The macOS menu's
# "Quit kitty" item still works (intentional), and confirm_os_window_close above
# still asks before the actual quit as a second safety net.
map cmd+q                   no_op
map cmd+alt+q               quit
# Cmd+1..8 jump to a tab; Cmd+9 = previously-active tab (0/negative semantics).
map cmd+1                   goto_tab 1
map cmd+2                   goto_tab 2
map cmd+3                   goto_tab 3
map cmd+4                   goto_tab 4
map cmd+5                   goto_tab 5
map cmd+6                   goto_tab 6
map cmd+7                   goto_tab 7
map cmd+8                   goto_tab 8
map cmd+9                   goto_tab -1
map kitty_mod+right_bracket next_tab
map kitty_mod+left_bracket  previous_tab
# Move the current tab left / right.
map kitty_mod+period        move_tab_forward
map kitty_mod+comma         move_tab_backward
# Rename the current tab.
map kitty_mod+alt+t         set_tab_title
# Project switcher (sessionizer): opens or focuses a tab bound to a tmux session.
map cmd+p                   launch --type=overlay --cwd=current zsh -ic /Users/vini/.config/tmux/scripts/sessionizer.sh

# --- Reload config -----------------------------------------------------------
map kitty_mod+f5            load_config_file


# =============================================================================
#  MOUSE   (WezTerm: Shift+RightClick = copy-if-selection-else-paste)
# =============================================================================
# kitty can't express the conditional in one binding, so Shift+RightClick pastes
# from the clipboard. (Copy stays on the default Ctrl+Shift+C / Cmd+C.)
mouse_map shift+right press ungrabbed paste_from_clipboard
