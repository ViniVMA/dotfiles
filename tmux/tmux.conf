# ============================================================================
# Core options
# ============================================================================

# Leader: C-a (with double-tap to send literal C-a to underlying shell)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# True color + italics support
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB,xterm-ghostty:RGB,*:Tc"

# Sane defaults
set -g escape-time 10
set -g history-limit 50000
set -g focus-events on
set -g mouse on
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1
set -g status-interval 10
set -g set-clipboard on

# Reload config
bind R source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded"

# Splits open in current pane's directory
bind '\' split-window -h -c "#{pane_current_path}"
bind '-' split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ============================================================================
# Pane focus and resize (leader-prefixed)
# ============================================================================

bind h if -F '#{window_zoomed_flag}' 'select-pane -L; resize-pane -Z' 'select-pane -L'
bind j if -F '#{window_zoomed_flag}' 'select-pane -D; resize-pane -Z' 'select-pane -D'
bind k if -F '#{window_zoomed_flag}' 'select-pane -U; resize-pane -Z' 'select-pane -U'
bind l if -F '#{window_zoomed_flag}' 'select-pane -R; resize-pane -Z' 'select-pane -R'
bind z resize-pane -Z
bind q kill-pane

# Resize: hold prefix once, hammer arrow keys (-r repeats without re-pressing leader)
bind -r Left  resize-pane -L 5
bind -r Down  resize-pane -D 3
bind -r Up    resize-pane -U 3
bind -r Right resize-pane -R 5

# Zellij-style resize mode: enter with C-a r, exit with Esc/Enter
bind r switch-client -T resize_mode
bind -T resize_mode h resize-pane -L 5  \; switch-client -T resize_mode
bind -T resize_mode j resize-pane -D 3  \; switch-client -T resize_mode
bind -T resize_mode k resize-pane -U 3  \; switch-client -T resize_mode
bind -T resize_mode l resize-pane -R 5  \; switch-client -T resize_mode
bind -T resize_mode H resize-pane -L 20 \; switch-client -T resize_mode
bind -T resize_mode J resize-pane -D 10 \; switch-client -T resize_mode
bind -T resize_mode K resize-pane -U 10 \; switch-client -T resize_mode
bind -T resize_mode L resize-pane -R 20 \; switch-client -T resize_mode
bind -T resize_mode Escape switch-client -T root
bind -T resize_mode Enter  switch-client -T root

# Zellij-style move mode: enter with C-a m, h/j/k/l swap pane in that direction
bind m switch-client -T move_mode
bind -T move_mode h swap-pane -s '{left-of}'  \; switch-client -T move_mode
bind -T move_mode j swap-pane -s '{down-of}'  \; switch-client -T move_mode
bind -T move_mode k swap-pane -s '{up-of}'    \; switch-client -T move_mode
bind -T move_mode l swap-pane -s '{right-of}' \; switch-client -T move_mode
bind -T move_mode Escape switch-client -T root
bind -T move_mode Enter  switch-client -T root

# ============================================================================
# Window management (leader-prefixed)
# ============================================================================

bind t new-window -c "#{pane_current_path}"
bind H previous-window
bind L next-window
bind 1 select-window -t :=1
bind 2 select-window -t :=2
bind 3 select-window -t :=3
bind 4 select-window -t :=4
bind 5 select-window -t :=5
bind 6 select-window -t :=6
bind 7 select-window -t :=7
bind 8 select-window -t :=8
bind 9 select-window -t :=9
bind ',' command-prompt -I "#W" "rename-window '%%'"
bind '[' swap-window -t -1 \; previous-window
bind ']' swap-window -t +1 \; next-window

# ============================================================================
# Launchers (leader-prefixed)
# ============================================================================

bind c split-window -h -c "#{pane_current_path}" "zsh -ic 'claude --dangerously-skip-permissions'"
bind D display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "zsh -ic lazydocker"
bind e new-window -c "#{pane_current_path}" "zsh -ic nvim"
bind g display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "zsh -ic lazygit"
bind p display-popup -E -w 60% -h 50% "zsh -ic '~/.config/tmux/scripts/sessionizer.sh'"

# Edit scrollback in nvim
bind i run-shell 'tmux capture-pane -p -S -50000 > /tmp/tmux-scrollback-#{pane_id}.log && tmux display-popup -E -w 90% -h 90% "nvim /tmp/tmux-scrollback-#{pane_id}.log"'

# ============================================================================
# Session and copy-mode (leader-prefixed)
# ============================================================================

bind d detach-client

# Copy-mode (vi-style)
setw -g mode-keys vi
bind v copy-mode
bind -T copy-mode-vi 'v' send-keys -X begin-selection
bind -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi 'Escape' send-keys -X cancel

# Search in buffer
bind '/' copy-mode \; send-keys ?

# ============================================================================
# Plugins (TPM)
# ============================================================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Continuum auto-restore on tmux start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# ============================================================================
# Pane borders
# ============================================================================

set -g pane-border-lines heavy
set -g pane-border-style "fg=#494d64"
set -g pane-active-border-style "fg=#a3d6a3,bold"
set -g pane-border-status off

# ============================================================================
# Statusbar
# ============================================================================

set -g status-position top
set -g status-justify left
set -g status-left-length 100
set -g status-right-length 100

# Two-line status bar with the second line empty = padding below status
set -g status 2
set -g status-format[1] ""

set -g status-style default
set -g window-status-style default
set -g window-status-activity-style default
set -g message-style default

# Inactive windows: plain. Active window: green foreground, bold.
set -g window-status-format " ● #I #W#{?window_zoomed_flag, 󰍉,} "
set -g window-status-current-format "#[fg=#a3d6a3,bold] ● #I #W#{?window_zoomed_flag, 󰍉,} #[default]"

# Mode indicator: LEADER when prefix pressed, COPY in copy-mode, NORMAL otherwise.
set -g status-left "#{?#{==:#{client_key_table},resize_mode},#[fg=#ed8796#,bold]  | RESIZE#[default],#{?#{==:#{client_key_table},move_mode},#[fg=#8bd5ca#,bold]  | MOVE#[default],#{?client_prefix,#[fg=#eed49f#,bold]  | LEADER#[default],#{?pane_in_mode,#[fg=#a6da95#,bold]  | COPY#[default],#[fg=#a5adcb]  | NORMAL#[default]}}}} "

# Right: sysinfo + datetime
set -g status-right "#(bash ~/.config/tmux/scripts/sysinfo.sh)  󰃭 #(date '+%a, %b %d  %H:%M')"

# Keep TPM init at the very bottom
run '~/.config/tmux/plugins/tpm/tpm'
