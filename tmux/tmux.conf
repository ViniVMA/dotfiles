# ============================================================================
# Core options
# ============================================================================

# Leader: C-a (with double-tap to send literal C-a to underlying shell)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# True color + italics support
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB,xterm-ghostty:RGB,*:Tc"

# Undercurl (squiggly LSP diagnostic underlines) + colored underlines
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# Sane defaults
set -g escape-time 10
set -g history-limit 50000
set -g focus-events on
set -g mouse on
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1
set -g status-interval 10
set -g set-clipboard on

# Feed the current folder (basename of the pane's path) to kitty as the
# terminal title, so the kitty tab name tracks the folder you're working in.
set -g set-titles on
set -g set-titles-string '#{b:pane_current_path}'

# Reload config
bind R source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded"

# Splits open in current pane's directory
bind '\' split-window -h -c "#{pane_current_path}"
bind '-' split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Layout: stack secondary panes on the left, keep the main pane on the right
bind V select-layout main-vertical-mirrored

# ============================================================================
# Pane focus and resize (leader-prefixed)
# ============================================================================

bind h if -F '#{window_zoomed_flag}' 'select-pane -L; resize-pane -Z' 'select-pane -L'
bind j if -F '#{window_zoomed_flag}' 'select-pane -D; resize-pane -Z' 'select-pane -D'
bind k if -F '#{window_zoomed_flag}' 'select-pane -U; resize-pane -Z' 'select-pane -U'
bind l if -F '#{window_zoomed_flag}' 'select-pane -R; resize-pane -Z' 'select-pane -R'
bind z resize-pane -Z
bind q kill-pane

# Resize: hold prefix once, hammer arrow keys (-r repeats without re-pressing leader)
bind -r Left  resize-pane -L 5
bind -r Down  resize-pane -D 3
bind -r Up    resize-pane -U 3
bind -r Right resize-pane -R 5

# Zellij-style resize mode: enter with C-a r, exit with Esc/Enter
bind r switch-client -T resize_mode
bind -T resize_mode h resize-pane -L 5  \; switch-client -T resize_mode
bind -T resize_mode j resize-pane -D 3  \; switch-client -T resize_mode
bind -T resize_mode k resize-pane -U 3  \; switch-client -T resize_mode
bind -T resize_mode l resize-pane -R 5  \; switch-client -T resize_mode
bind -T resize_mode H resize-pane -L 20 \; switch-client -T resize_mode
bind -T resize_mode J resize-pane -D 10 \; switch-client -T resize_mode
bind -T resize_mode K resize-pane -U 10 \; switch-client -T resize_mode
bind -T resize_mode L resize-pane -R 20 \; switch-client -T resize_mode
bind -T resize_mode Escape switch-client -T root
bind -T resize_mode Enter  switch-client -T root

# Zellij-style move mode: enter with C-a m, h/j/k/l swap pane in that direction
bind m switch-client -T move_mode
bind -T move_mode h swap-pane -s '{left-of}'  \; switch-client -T move_mode
bind -T move_mode j swap-pane -s '{down-of}'  \; switch-client -T move_mode
bind -T move_mode k swap-pane -s '{up-of}'    \; switch-client -T move_mode
bind -T move_mode l swap-pane -s '{right-of}' \; switch-client -T move_mode
bind -T move_mode Escape switch-client -T root
bind -T move_mode Enter  switch-client -T root

# ============================================================================
# Window management (leader-prefixed)  [tmux windows live WITHIN a kitty tab]
# ============================================================================
# kitty owns the outer tab layer (sessions/projects, via Cmd+T / Cmd+1-9), but
# you can still have multiple tmux windows inside a session and switch them here.
bind t new-window -c "#{pane_current_path}"
bind w choose-tree -Zw
bind H previous-window
bind L next-window
bind 1 select-window -t :=1
bind 2 select-window -t :=2
bind 3 select-window -t :=3
bind 4 select-window -t :=4
bind 5 select-window -t :=5
bind 6 select-window -t :=6
bind 7 select-window -t :=7
bind 8 select-window -t :=8
bind 9 select-window -t :=9
bind ',' command-prompt -I "#W" "rename-window '%%'"
bind '[' swap-window -t -1 \; previous-window
bind ']' swap-window -t +1 \; next-window

# ============================================================================
# Launchers (leader-prefixed)
# ============================================================================

bind c split-window -h -c "#{pane_current_path}" "zsh -ic 'claude --dangerously-skip-permissions'"
bind D display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "zsh -ic lazydocker"
bind e new-window -c "#{pane_current_path}" "zsh -ic nvim"
bind g display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "zsh -ic lazygit"
bind p display-popup -E -w 60% -h 50% "zsh -ic '~/.config/tmux/scripts/sessionizer.sh'"

# Edit scrollback in nvim
bind i run-shell 'tmux capture-pane -p -S -50000 > /tmp/tmux-scrollback-#{pane_id}.log && tmux display-popup -E -w 90% -h 90% "nvim /tmp/tmux-scrollback-#{pane_id}.log"'

# ============================================================================
# Session and copy-mode (leader-prefixed)
# ============================================================================

bind d detach-client

# Copy-mode (vi-style)
setw -g mode-keys vi
bind v copy-mode
bind -T copy-mode-vi 'v' send-keys -X begin-selection
bind -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi 'Escape' send-keys -X cancel

# Mouse focus should not turn tiny pointer movement into clipboard writes.
bind -T root MouseDrag1Pane if -F '#{mouse_any_flag}' 'send-keys -M' 'select-pane -t ='
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel -C

# Wheel scrolling: pass through to full-screen mouse apps (nvim/less); in a
# normal pane enter copy-mode with -e so it auto-exits at the bottom instead
# of sticking. Scrolls tmux history without leaving you trapped in copy-mode.
bind -T root WheelUpPane   if -F '#{mouse_any_flag}' 'send-keys -M' 'if -F "#{pane_in_mode}" "send-keys -X scroll-up" "copy-mode -e"'
bind -T root WheelDownPane if -F '#{mouse_any_flag}' 'send-keys -M' 'send-keys -M'

# Search in buffer
bind '/' copy-mode \; send-keys ?

# ============================================================================
# Plugins (TPM)
# ============================================================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Continuum auto-restore on tmux start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# ============================================================================
# Pane borders
# ============================================================================

set -g pane-border-lines heavy
set -g pane-border-style "fg=#494d64"
set -g pane-active-border-style "fg=#a3d6a3,bold"
set -g pane-border-status off

# ============================================================================
# Statusbar  (top, 2 lines; session box + window list, then a rule line)
# ============================================================================

set -g status 2
set -g status-position top
set -g status-style default
set -g message-style default

# Line 0: mode text + session name box + window list (number:process).
# Line 1: a dim full-width rule separating the status bar from the terminal.
set -g status-format[0] "#[align=left] #{?#{==:#{client_key_table},resize_mode},#[fg=#ed8796#,bold]RESIZE#[default],#{?#{==:#{client_key_table},move_mode},#[fg=#8bd5ca#,bold]MOVE#[default],#{?client_prefix,#[fg=#eed49f#,bold]LEADER#[default],#{?pane_in_mode,#[fg=#c6a0f6#,bold]COPY#[default],#[fg=#a5adcb]NORMAL#[default]}}}}  #[fg=#101010,bg=#8aadf4,bold] #S #[default] #[fg=#666666]│#[default]  #{W:#[fg=#666666]#{window_index}:#{?#{m/r:^[0-9]+[.][0-9],#{pane_current_command}},claude,#{pane_current_command}} ,#[fg=#8aadf4]#[bold]#{window_index}:#{?#{m/r:^[0-9]+[.][0-9],#{pane_current_command}},claude,#{pane_current_command}} #[default]}#{?window_zoomed_flag,#[fg=#eed49f#,bold] 󰍉 ZOOM#[default],}"
set -g status-format[1] "#[fg=#494d64]────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────"

# Keep TPM init at the very bottom
run '~/.config/tmux/plugins/tpm/tpm'
