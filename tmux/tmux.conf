# ============================================================================
# Core options
# ============================================================================

# Leader: C-a (with double-tap to send literal C-a to underlying shell)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# True color + italics support
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB,xterm-ghostty:RGB,*:Tc"

# Sane defaults
set -g escape-time 10
set -g history-limit 50000
set -g focus-events on
set -g mouse on
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1
set -g status-interval 10
set -g set-clipboard on

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded"

# Splits open in current pane's directory
bind '\' split-window -h -c "#{pane_current_path}"
bind '-' split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ============================================================================
# Pane focus and resize (leader-prefixed)
# ============================================================================

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind z resize-pane -Z
bind q kill-pane

# ============================================================================
# Window management (leader-prefixed)
# ============================================================================

bind t new-window -c "#{pane_current_path}"
bind H previous-window
bind L next-window
bind 1 select-window -t :=1
bind 2 select-window -t :=2
bind 3 select-window -t :=3
bind 4 select-window -t :=4
bind 5 select-window -t :=5
bind 6 select-window -t :=6
bind 7 select-window -t :=7
bind 8 select-window -t :=8
bind 9 select-window -t :=9
bind ',' command-prompt -I "#W" "rename-window '%%'"
bind '[' swap-window -t -1 \; previous-window
bind ']' swap-window -t +1 \; next-window

# ============================================================================
# Launchers (leader-prefixed)
# ============================================================================

bind c split-window -h -c "#{pane_current_path}" "zsh -ic 'claude --dangerously-skip-permissions'"
bind D display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "zsh -ic lazydocker"
bind e new-window -c "#{pane_current_path}" "zsh -ic nvim"
bind g display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "zsh -ic lazygit"
bind p display-popup -E -w 60% -h 50% "zsh -ic '~/.config/tmux/scripts/sessionizer.sh'"

# Edit scrollback in nvim
bind i run-shell 'tmux capture-pane -p -S -50000 > /tmp/tmux-scrollback-#{pane_id}.log && tmux display-popup -E -w 90% -h 90% "nvim /tmp/tmux-scrollback-#{pane_id}.log"'

# ============================================================================
# Session and copy-mode (leader-prefixed)
# ============================================================================

bind d detach-client

# Copy-mode (vi-style)
setw -g mode-keys vi
bind v copy-mode
bind -T copy-mode-vi 'v' send-keys -X begin-selection
bind -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi 'Escape' send-keys -X cancel

# Search in buffer
bind '/' copy-mode \; send-keys ?

# ============================================================================
# Plugins (TPM)
# ============================================================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Continuum auto-restore on tmux start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# ============================================================================
# Pane borders
# ============================================================================

set -g pane-border-lines heavy
set -g pane-border-style "fg=#494d64"
set -g pane-active-border-style "fg=#f5a97f,bold"
set -g pane-border-status off

# ============================================================================
# Statusbar
# ============================================================================

set -g status-position top
set -g status-justify left
set -g status-left-length 100
set -g status-right-length 100

set -g status-style default
set -g window-status-style default
set -g window-status-activity-style default
set -g message-style default

# Inactive windows: plain. Active window: peach foreground, bold.
set -g window-status-format " #I #W "
set -g window-status-current-format "#[fg=#f5a97f,bold] #I #W #[default]"

# Mode indicator: LEADER when prefix pressed, COPY in copy-mode, NORMAL otherwise.
set -g status-left "● #S #{?client_prefix,#[fg=#eed49f#,bold]LEADER#[default],#{?pane_in_mode,#[fg=#a6da95#,bold]COPY#[default],#[fg=#a5adcb]NORMAL#[default]}} "

# Right: sysinfo + datetime
set -g status-right "#(bash ~/.config/tmux/scripts/sysinfo.sh)  󰃭 #(date '+%a, %b %d  %H:%M')"

# Keep TPM init at the very bottom
run '~/.config/tmux/plugins/tpm/tpm'
